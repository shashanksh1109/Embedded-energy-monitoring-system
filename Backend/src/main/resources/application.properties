# ================================================================
# Server Configuration
# ================================================================
server.port=8081

# ================================================================
# PostgreSQL Database
# ================================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:energy_db}
spring.datasource.username=${DB_USER:energy_user}
spring.datasource.password=${DB_PASSWORD:energy_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP - default in Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ================================================================
# JPA / Hibernate
# ================================================================
# validate = check DB schema matches entities (safe for production)
# update  = auto-alter tables (dev only)
# none    = do nothing
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ================================================================
# JWT Security
# ================================================================
# Secret key (override via environment variable in production)
jwt.secret=${JWT_SECRET:energy-monitoring-secret-key-change-in-production-min-256-bits}
jwt.expiration.ms=86400000

# ================================================================
# SpringDoc / Swagger UI
# ================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ================================================================
# WebSocket
# ================================================================
# WebSocket endpoint: ws://localhost:8081/ws
# STOMP topic prefix: /topic
# App destination prefix: /app

# ================================================================
# Logging
# ================================================================
logging.level.com.energy=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ================================================================
# Application Info (visible in Swagger UI)
# ================================================================
spring.application.name=Energy Monitoring API
# AWS ECS Mode Control
aws.ecs.cluster=energy-management-cluster
aws.ecs.sensor-service=energy-management-sensor
