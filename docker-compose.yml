version: '3.3'

services:

  # ─── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:15
    container_name: energy-db
    environment:
      POSTGRES_DB:       energy_db
      POSTGRES_USER:     energy_user
      POSTGRES_PASSWORD: energy_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    networks:
      - energy-network
    restart: unless-stopped

  # ─── Python Gateway ───────────────────────────────────────────────────────────
  gateway:
    build:
      context: ./Gateway
      dockerfile: Dockerfile
    container_name: energy-gateway
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - energy-network
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=energy_db
      - DB_USER=energy_user
      - DB_PASSWORD=energy_pass

  # ─── Temperature Sensor (C) ───────────────────────────────────────────────────
  sensor:
    build:
      context: ./Embedded
      dockerfile: Dockerfile
    container_name: energy-sensor
    command: ["./temp_sensor", "TEMP_A", "Zone_A", "22.0", "5"]
    depends_on:
      - gateway
    networks:
      - energy-network
    restart: unless-stopped
    environment:
      - GATEWAY_HOST=gateway

  # ─── HVAC Controller (C) ──────────────────────────────────────────────────────
  hvac:
    build:
      context: ./Embedded
      dockerfile: Dockerfile
    container_name: energy-hvac
    command: ["./hvac_controller", "HVAC_A", "Zone_A", "20.0"]
    depends_on:
      - gateway
    networks:
      - energy-network
    restart: unless-stopped
    environment:
      - GATEWAY_HOST=gateway

  # ─── Power Meter (C) ──────────────────────────────────────────────────────────
  power:
    build:
      context: ./Embedded
      dockerfile: Dockerfile
    container_name: energy-power
    command: ["./power_meter", "POWER_A", "Zone_A"]
    depends_on:
      - gateway
    networks:
      - energy-network
    restart: unless-stopped
    environment:
      - GATEWAY_HOST=gateway

  # ─── Occupancy Sensor (C) ─────────────────────────────────────────────────────
  occupancy:
    build:
      context: ./Embedded
      dockerfile: Dockerfile
    container_name: energy-occupancy
    command: ["./occupancy_sensor", "OCC_A", "Zone_A", "5"]
    depends_on:
      - gateway
    networks:
      - energy-network
    restart: unless-stopped
    environment:
      - GATEWAY_HOST=gateway

networks:
  energy-network:
    driver: bridge

volumes:
  postgres_data: