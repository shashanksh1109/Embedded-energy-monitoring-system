version: '3.3'

services:

  # ─── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:15
    container_name: energy-db
    environment:
      POSTGRES_DB:       energy_db
      POSTGRES_USER:     energy_user
      POSTGRES_PASSWORD: energy_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    networks:
      - energy-network
    restart: unless-stopped

  # ─── Python Gateway ───────────────────────────────────────────────────────────
  # Build context is project root so Dockerfile can reach both
  # Gateway/*.py and Embedded/*.c in one build
  gateway:
    build:
      context: .
      dockerfile: Gateway/Dockerfile
    container_name: energy-gateway
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - energy-network
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=energy_db
      - DB_USER=energy_user
      - DB_PASSWORD=energy_pass
      - GATEWAY_HOST=gateway

  # ─── Temperature Sensor (C) ───────────────────────────────────────────────────
  # base_temp=15.0 → below 18°C threshold → gateway will spawn HVAC automatically
  sensor:
    build:
      context: ./Embedded
      dockerfile: Dockerfile
    container_name: energy-sensor
    command: ["./temp_sensor", "TEMP_A", "Zone_A", "15.0", "5"]
    depends_on:
      - gateway
    networks:
      - energy-network
    restart: unless-stopped
    environment:
      - GATEWAY_HOST=gateway

  # ─── Occupancy Sensor (C) ─────────────────────────────────────────────────────
  occupancy:
    build:
      context: ./Embedded
      dockerfile: Dockerfile
    container_name: energy-occupancy
    command: ["./occupancy_sensor", "OCC_A", "Zone_A", "5"]
    depends_on:
      - gateway
    networks:
      - energy-network
    restart: unless-stopped
    environment:
      - GATEWAY_HOST=gateway

  # NOTE: hvac and power services removed.
  # Gateway spawns hvac_controller and power_meter as child processes
  # automatically when temperature goes out of range.

networks:
  energy-network:
    driver: bridge

volumes:
  postgres_data: