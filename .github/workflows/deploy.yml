name: Deploy Energy Management System

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 993268716712.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER: energy-management-cluster

jobs:
  # ─── JOB 1: Test Backend ─────────────────────────────────────────────
  test-backend:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run JUnit tests
        working-directory: Backend
        run: mvn test
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: Backend/target/surefire-reports/

  # ─── JOB 2: Test Frontend ────────────────────────────────────────────
  test-frontend:
    name: Run Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json
      - name: Install dependencies
        working-directory: Frontend
        run: npm ci
      - name: Run Vitest tests
        working-directory: Frontend
        run: npm test

  # ─── JOB 3: Test Gateway ─────────────────────────────────────────────
  test-gateway:
    name: Run Gateway Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: Gateway
        run: pip install -r requirements.txt
      - name: Run pytest
        working-directory: Gateway
        run: python3 -m pytest tests/ -v

  # ─── JOB 4: Deploy Backend ───────────────────────────────────────────
  deploy-backend:
    name: Build & Deploy Spring Boot Backend
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build JAR
        working-directory: Backend
        run: mvn clean package -DskipTests -q
      - name: Build and push backend image
        working-directory: Backend
        run: |
          docker build -t $ECR_REGISTRY/energy-management/backend:latest .
          docker build -t $ECR_REGISTRY/energy-management/backend:${{ github.sha }} .
          docker push $ECR_REGISTRY/energy-management/backend:latest
          docker push $ECR_REGISTRY/energy-management/backend:${{ github.sha }}
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service energy-management-backend \
            --force-new-deployment \
            --region $AWS_REGION

  # ─── JOB 5: Deploy Frontend ──────────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy React Frontend
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json
      - name: Install dependencies
        working-directory: Frontend
        run: npm ci
      - name: Build React app
        working-directory: Frontend
        run: npm run build
      - name: Deploy to S3
        run: |
          aws s3 sync Frontend/dist/ \
            s3://energy-management-frontend-993268716712/ \
            --delete \
            --region $AWS_REGION

  # ─── JOB 6: Deploy Embedded Services ─────────────────────────────────
  deploy-embedded:
    name: Build & Deploy Embedded Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build embedded image
        working-directory: Embedded
        run: docker build -t energy-embedded .
      - name: Push sensor image
        run: |
          docker tag energy-embedded $ECR_REGISTRY/energy-management/sensor:latest
          docker tag energy-embedded $ECR_REGISTRY/energy-management/sensor:${{ github.sha }}
          docker push $ECR_REGISTRY/energy-management/sensor:latest
          docker push $ECR_REGISTRY/energy-management/sensor:${{ github.sha }}
      - name: Push HVAC image
        run: |
          docker tag energy-embedded $ECR_REGISTRY/energy-management/hvac:latest
          docker tag energy-embedded $ECR_REGISTRY/energy-management/hvac:${{ github.sha }}
          docker push $ECR_REGISTRY/energy-management/hvac:latest
          docker push $ECR_REGISTRY/energy-management/hvac:${{ github.sha }}
      - name: Push power image
        run: |
          docker tag energy-embedded $ECR_REGISTRY/energy-management/power:latest
          docker tag energy-embedded $ECR_REGISTRY/energy-management/power:${{ github.sha }}
          docker push $ECR_REGISTRY/energy-management/power:latest
          docker push $ECR_REGISTRY/energy-management/power:${{ github.sha }}
      - name: Deploy to ECS
        run: |
          for svc in sensor hvac power; do
            aws ecs update-service \
              --cluster $ECS_CLUSTER \
              --service energy-management-$svc \
              --force-new-deployment \
              --region $AWS_REGION
          done

  # ─── JOB 7: Deploy Gateway ───────────────────────────────────────────
  deploy-gateway:
    name: Build & Deploy Python Gateway
    runs-on: ubuntu-latest
    needs: test-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push gateway image
        working-directory: Gateway
        run: |
          docker build -t $ECR_REGISTRY/energy-management/gateway:latest .
          docker build -t $ECR_REGISTRY/energy-management/gateway:${{ github.sha }} .
          docker push $ECR_REGISTRY/energy-management/gateway:latest
          docker push $ECR_REGISTRY/energy-management/gateway:${{ github.sha }}
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service energy-management-gateway \
            --force-new-deployment \
            --region $AWS_REGION
